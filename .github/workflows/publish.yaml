name: publish

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: eddypro-engine

jobs:
  build-and-push-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          role-session-name: GitHubActions-EddyPro
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        id: build-image
        shell: bash
        run: |
          set -euo pipefail
          image_name="${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}"
          docker build --build-arg "IMAGE_VERSION=${{ github.ref_name }}" -t "${image_name}" .
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"

      - name: Push image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          image_name="${{ steps.build-image.outputs.image_name }}"
          full_image_name="${ECR_REGISTRY}/${image_name}"
          echo "Pushing ${full_image_name}"
          docker tag "${image_name}" "${full_image_name}"
          docker push "${full_image_name}"
